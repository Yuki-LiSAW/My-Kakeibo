<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル家計簿</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary: #4caf50; --bg: #f5f5f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px; background: var(--bg); color: #333; }
        .card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 16px; }
        h1, h2 { margin-top: 0; color: #222; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .total { font-size: 24px; font-weight: bold; color: var(--primary); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px 0; border-bottom: 1px solid #eee; font-size: 15px; }
        li:last-child { border: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>👛 マイ家計簿</h1>
        <div class="flex">
            <span>今月の合計支出:</span>
            <span class="total" id="totalAmount">¥0</span>
        </div>
    </div>

    <div class="card">
        <h2>✍️ 記録する</h2>
        <form id="expenseForm">
            <input type="number" id="amount" placeholder="金額 (円)" inputmode="numeric" required>
            <select id="category">
                <option value="食費">食費</option>
                <option value="日用品">日用品</option>
                <option value="交際費">交際費</option>
                <option value="固定費">固定費</option>
                <option value="その他">その他</option>
            </select>
            <button type="submit">追加する</button>
        </form>
    </div>

    <div class="card">
        <h2>📜 履歴</h2>
        <ul id="historyList"></ul>
        <button id="clearBtn" style="background: #e53935; margin-top: 16px;">データを全削除</button>
    </div>

    <script>
        // PWAの登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log('SW Registered'));
        }

        const form = document.getElementById('expenseForm');
        const historyList = document.getElementById('historyList');
        const totalAmount = document.getElementById('totalAmount');
        const clearBtn = document.getElementById('clearBtn');

        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

        function updateUI() {
            historyList.innerHTML = '';
            let total = 0;
            
            expenses.forEach((item, index) => {
                total += item.amount;
                const li = document.createElement('li');
                li.className = 'flex';
                li.innerHTML = `<span>${item.category}</span> <span>¥${item.amount.toLocaleString()}</span>`;
                historyList.appendChild(li);
            });
            
            totalAmount.textContent = `¥${total.toLocaleString()}`;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const amount = parseInt(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            
            expenses.unshift({ amount, category, date: new Date().toISOString() });
            localStorage.setItem('expenses', JSON.stringify(expenses));
            
            form.reset();
            updateUI();
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('本当にすべてのデータを削除しますか？')) {
                expenses = [];
                localStorage.removeItem('expenses');
                updateUI();
            }
        });

        updateUI();
    </script>
</body>
</html>
